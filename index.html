<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>はたらくのりもの クイズ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6B6B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="くるまクイズ">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-24px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(8px); }
  60%      { transform: translateX(-6px); }
  80%      { transform: translateX(6px); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.45); }
  100% { transform: scale(1); }
}
@keyframes feedbackPop {
  from { opacity: 0; transform: scale(0.6); }
  60%  { transform: scale(1.15); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes starFloat {
  0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-90px) scale(0.4) rotate(360deg); }
}
@keyframes confettiFall {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(120px) rotate(720deg); }
}
@keyframes titleBob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}
@keyframes nextPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(78,205,196,0.5); }
  60%      { box-shadow: 0 0 0 10px rgba(78,205,196,0); }
}
@keyframes bgmPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(160deg, #fff5e0 0%, #ffe8f0 40%, #e8f4ff 100%);
  min-height: 100vh;
  display: flex; justify-content: center;
  padding: 2rem 1rem;
  font-family: 'Hiragino Maru Gothic ProN', 'rounded mplus 1c', sans-serif;
}
.wrap { max-width: 520px; width: 100%; }
.title {
  font-size: 28px; font-weight: 900; text-align: center; letter-spacing: 2px;
  background: linear-gradient(90deg, #FF6B6B, #FF9F43, #FFD93D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleBob 2.5s ease-in-out infinite;
  margin-bottom: 2px;
}
.title-en { font-size: 13px; color: #FFB347; text-align: center; margin-bottom: 1rem; font-weight: 700; letter-spacing: 1px; }
.score-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 0.75rem; }
.score-item {
  text-align: center; border-radius: 16px; padding: 8px 18px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}
.score-item:nth-child(1) { background: linear-gradient(135deg, #FFD6D6, #FFAAAA); }
.score-item:nth-child(2) { background: linear-gradient(135deg, #D6EEFF, #AACFFF); }
.score-item:nth-child(3) { background: linear-gradient(135deg, #D6FFE4, #AAFFCC); }
.score-num { font-size: 26px; font-weight: 900; color: #333; }
.score-label { font-size: 11px; color: #777; font-weight: 700; }
.score-num.popped { animation: pop 0.4s ease; }
.progress-wrap { margin-bottom: 1rem; }
.progress-bar-bg { background: #ffe0e0; border-radius: 99px; height: 10px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.08); }
.progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #FF6B6B, #FFD93D); transition: width 0.5s cubic-bezier(.4,1.6,.6,1); }
.car-box {
  border: none;
  border-radius: 24px;
  background: #fff;
  padding: 1.25rem;
  text-align: center;
  margin-bottom: 1rem;
  box-shadow: 0 6px 24px rgba(255,107,107,0.13), 0 2px 8px rgba(0,0,0,0.06);
  animation: slideIn 0.4s cubic-bezier(.4,1.6,.6,1);
}
.car-svg-wrap { width: 100%; max-width: 320px; margin: 0 auto 10px; }
.car-img { width: 100%; max-width: 320px; height: 180px; object-fit: cover; border-radius: 14px; display: block; margin: 0 auto 10px; box-shadow: 0 3px 12px rgba(0,0,0,0.10); }
.q-jp { font-size: 20px; font-weight: 900; color: #FF6B6B; margin-bottom: 2px; }
.q-en { font-size: 13px; color: #FFB347; margin-bottom: 10px; font-weight: 700; }
.speak-btn {
  padding: 8px 22px; font-size: 14px;
  border: none; border-radius: 99px;
  background: linear-gradient(90deg, #FFE0A0, #FFD6D6);
  color: #CC5500; cursor: pointer; font-weight: 900;
  box-shadow: 0 2px 8px rgba(255,180,0,0.2);
  transition: transform 0.12s;
}
.speak-btn:active { transform: scale(0.95); }
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.choice-btn {
  padding: 16px 8px;
  border: none; border-radius: 20px;
  background: #fff; color: #333;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  font-family: inherit;
}
.choice-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
.choice-btn:active { transform: scale(0.96); }
.choice-btn:nth-child(1) { background: linear-gradient(145deg, #fff5f5, #ffe8e8); border-bottom: 4px solid #FF6B6B; }
.choice-btn:nth-child(2) { background: linear-gradient(145deg, #f0fffe, #d6f8f4); border-bottom: 4px solid #4ECDC4; }
.choice-btn:nth-child(3) { background: linear-gradient(145deg, #fffce8, #fff3b0); border-bottom: 4px solid #FFD93D; }
.choice-btn:nth-child(4) { background: linear-gradient(145deg, #f0fff8, #c8f5e8); border-bottom: 4px solid #95E1D3; }
.choice-btn.correct { background: linear-gradient(145deg, #e8fff0, #b6ffce) !important; border-bottom: 4px solid #2ECC71 !important; color: #1a7a40; }
.choice-btn.wrong { background: linear-gradient(145deg, #fff0f0, #ffcccc) !important; border-bottom: 4px solid #E74C3C !important; color: #922b21; animation: shake 0.45s ease; }
.c-jp { display: block; font-size: 16px; font-weight: 900; }
.c-en { display: block; font-size: 11px; margin-top: 3px; opacity: 0.65; font-weight: 700; }
.feedback { text-align: center; min-height: 60px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; }
.fb-inner { animation: feedbackPop 0.4s cubic-bezier(.4,1.6,.6,1); }
.fb-jp { font-size: 24px; font-weight: 900; }
.fb-en { font-size: 13px; color: #888; margin-top: 3px; font-weight: 700; }
.next-btn {
  width: 100%; padding: 16px; font-size: 18px; font-weight: 900;
  border: none; border-radius: 20px;
  background: linear-gradient(90deg, #43e8d8, #4ECDC4);
  color: #fff; cursor: pointer; display: none;
  box-shadow: 0 4px 16px rgba(78,205,196,0.35);
  animation: nextPulse 1.4s ease infinite;
  font-family: inherit;
  letter-spacing: 1px;
  transition: transform 0.12s;
}
.next-btn:active { transform: scale(0.97); }
.result-box {
  text-align: center; padding: 2rem 1.5rem;
  background: #fff; border-radius: 28px;
  box-shadow: 0 8px 32px rgba(255,107,107,0.12);
  animation: slideIn 0.5s cubic-bezier(.4,1.4,.6,1);
}
.result-stars { font-size: 36px; letter-spacing: 6px; margin-bottom: 8px; }
.result-big { font-size: 60px; font-weight: 900; background: linear-gradient(90deg, #FF6B6B, #FFD93D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.res-jp { font-size: 22px; color: #FF8C00; margin: 8px 0 2px; font-weight: 900; }
.res-en { font-size: 14px; color: #bbb; margin-bottom: 1.5rem; font-weight: 700; }
.retry-btn {
  padding: 16px 40px; font-size: 18px; font-weight: 900;
  border: none; border-radius: 99px;
  background: linear-gradient(90deg, #FF6B6B, #FF9F43);
  color: #fff; cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,107,107,0.35);
  font-family: inherit;
  transition: transform 0.12s;
}
.retry-btn:active { transform: scale(0.96); }
.bgm-btn {
  display: block; margin: 0 auto 1rem;
  padding: 9px 26px; font-size: 14px; font-weight: 900;
  border: none; border-radius: 99px;
  background: linear-gradient(90deg, #FFE0A0, #FFCCEE);
  color: #CC5500; cursor: pointer;
  box-shadow: 0 2px 10px rgba(255,180,0,0.2);
  transition: transform 0.12s;
  font-family: inherit;
}
.bgm-btn:active { transform: scale(0.95); animation: bgmPop 0.3s ease; }
#confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
.mode-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 1rem; }
.mode-btn {
  padding: 10px 28px; font-size: 16px; font-weight: 900;
  border: none; border-radius: 99px;
  background: #eee; color: #999;
  cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.mode-btn.active {
  background: linear-gradient(90deg, #FF6B6B, #FFD93D);
  color: #fff;
  box-shadow: 0 4px 14px rgba(255,107,107,0.3);
}
.zukan-emoji { font-size: 48px; margin: 10px 0 4px; }
.zukan-name-jp { font-size: 26px; font-weight: 900; color: #FF6B6B; }
.zukan-name-en { font-size: 14px; font-weight: 700; color: #FFB347; margin-bottom: 10px; }
.zukan-fact {
  font-size: 16px; line-height: 1.8; color: #555;
  background: linear-gradient(135deg, #FFF9F0, #FFF0F5);
  border-radius: 16px; padding: 14px 18px; margin: 10px 0;
  font-weight: 700; text-align: left;
}
.zukan-nav { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 1rem; }
.zukan-nav-btn {
  padding: 12px 28px; font-size: 16px; font-weight: 900;
  border: none; border-radius: 99px;
  background: linear-gradient(90deg, #43e8d8, #4ECDC4);
  color: #fff; cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 12px rgba(78,205,196,0.3);
  transition: transform 0.12s;
}
.zukan-nav-btn:active { transform: scale(0.95); }
.zukan-counter { font-size: 18px; font-weight: 900; color: #888; min-width: 60px; text-align: center; }
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>
<div class="wrap">
  <div class="title">🚒 はたらくのりもの クイズ 🚌</div>
  <div class="title-en">✨ Working Vehicles Quiz ✨</div>
  <button class="bgm-btn" id="bgmBtn" onclick="toggleBgm()">🎵 BGM オン</button>
  <div class="mode-bar">
    <button class="mode-btn active" id="modeQuiz" onclick="switchMode('quiz')">🎯 クイズ</button>
    <button class="mode-btn" id="modeZukan" onclick="switchMode('zukan')">📖 ずかん</button>
  </div>
  <div class="score-bar" id="scoreBar">
    <div class="score-item"><div class="score-num" id="correct">0</div><div class="score-label">⭐ せいかい</div></div>
    <div class="score-item"><div class="score-num" id="qnum">1</div><div class="score-label">📝 もんだい</div></div>
    <div class="score-item"><div class="score-num" id="total">8</div><div class="score-label">🎯 ぜんぶ</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div id="quiz">
    <div class="car-box" id="carBox">
      <div id="carDisplay">
        <div class="car-svg-wrap"><svg id="carSvg" viewBox="0 0 280 160" width="100%" height="auto"></svg></div>
      </div>
      <div class="q-jp">この のりものは なに？</div>
      <div class="q-en">What is this vehicle?</div>
      <button class="speak-btn" onclick="speakQ()">🔊 もういちど きく</button>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">つぎへ ▶</button>
  </div>
  <div id="result" style="display:none;">
    <div class="result-box">
      <div class="result-stars" id="rStars"></div>
      <div class="result-big" id="rScore"></div>
      <div class="res-jp" id="rMsgJp"></div>
      <div class="res-en" id="rMsgEn"></div>
      <button class="retry-btn" onclick="restart()">🔄 もういちど あそぶ</button>
    </div>
  </div>
  <div id="zukan" style="display:none;">
    <div class="car-box" id="zukanBox">
      <div id="zukanDisplay"></div>
      <div class="zukan-emoji" id="zukanEmoji"></div>
      <div class="zukan-name-jp" id="zukanNameJp"></div>
      <div class="zukan-name-en" id="zukanNameEn"></div>
      <div class="zukan-fact" id="zukanFact"></div>
      <button class="speak-btn" onclick="sayJp(cars[zukanIdx].fact)">🔊 せつめいを きく</button>
    </div>
    <div class="zukan-nav">
      <button class="zukan-nav-btn" onclick="zukanPrev()">◀ まえ</button>
      <span class="zukan-counter" id="zukanCounter">1 / 12</span>
      <button class="zukan-nav-btn" onclick="zukanNext()">つぎ ▶</button>
    </div>
  </div>
</div>
<script>
const cars = [
  { jp: "しょうぼうしゃ", en: "Fire Truck", readJp: "しょうぼうしゃ！かじを けすよ！", readEn: "Fire truck!", type: "fire",
    fact: "しょうぼうしゃは おおきな ポンプで みずを だすよ。はしごしゃは ビルの うえまで とどくんだ！", emoji: "🚒" },
  { jp: "きゅうきゅうしゃ", en: "Ambulance", readJp: "きゅうきゅうしゃ！びょうきのひとを はこぶよ！", readEn: "Ambulance!", type: "ambulance",
    fact: "きゅうきゅうしゃは サイレンを ならして はしるよ。なかには ベッドや くすりが あるんだ！", emoji: "🚑" },
  { jp: "パトカー", en: "Police Car", readJp: "パトカー！まちを まもるよ！", readEn: "Police car!", type: "police",
    fact: "パトカーは しろと くろの もようだよ。あかと あおの ライトが くるくる まわるんだ！", emoji: "🚓" },
  { jp: "ごみしゅうしゅうしゃ", en: "Garbage Truck", readJp: "ごみしゅうしゅうしゃ！ごみを あつめるよ！", readEn: "Garbage truck!", type: "garbage",
    fact: "ごみしゅうしゅうしゃは まいにち まちを まわって ごみを あつめるよ。うしろから ごみを いれるんだ！", emoji: "🗑️" },
  { jp: "ダンプカー", en: "Dump Truck", readJp: "ダンプカー！つちや いしを はこぶよ！", readEn: "Dump truck!", type: "dump",
    fact: "ダンプカーは にだいが うしろに かたむいて つちを おろすよ。こうじげんばで だいかつやく！", emoji: "🚛" },
  { jp: "バス", en: "Bus", readJp: "バス！おきゃくさんを はこぶよ！", readEn: "Bus!", type: "bus",
    fact: "バスは たくさんの ひとを いちどに はこべるよ。まちの なかを はしる ろせんバスや とおくに いく こうそくバスが あるよ！", emoji: "🚌" },
  { jp: "クレーン車", en: "Crane Truck", readJp: "クレーンしゃ！おもいものを もちあげるよ！", readEn: "Crane truck!", type: "crane",
    fact: "クレーンしゃは ながい うでで おもい ものを もちあげるよ。ビルを つくる ときに つかうんだ！", emoji: "🏗️" },
  { jp: "タンクローリー", en: "Tanker Truck", readJp: "タンクローリー！あぶらを はこぶよ！", readEn: "Tanker truck!", type: "tanker",
    fact: "タンクローリーは まるい タンクに ガソリンや ぎゅうにゅうを いれて はこぶよ。きけんぶつの マークが ついてるんだ！", emoji: "⛽" },
  { jp: "でんしゃ", en: "Train", readJp: "でんしゃ！みんなを はこぶよ！", readEn: "Train!", type: "train",
    fact: "でんしゃは レールの うえを はしるよ。しんかんせんは じそく 300キロも でるんだ！", emoji: "🚃" },
  { jp: "ふね", en: "Ship", readJp: "ふね！うみを わたるよ！", readEn: "Ship!", type: "ship",
    fact: "ふねは うみや かわを わたるよ。おおきな ふねは くるまや コンテナも はこべるんだ！", emoji: "🚢" },
  { jp: "ひこうき", en: "Airplane", readJp: "ひこうき！そらを とぶよ！", readEn: "Airplane!", type: "airplane",
    fact: "ひこうきは そらの うえを とぶよ。おおきな ひこうきは 500にん いじょう のれるんだ！", emoji: "✈️" },
  { jp: "ショベルカー", en: "Excavator", readJp: "ショベルカー！つちを ほるよ！", readEn: "Excavator!", type: "excavator",
    fact: "ショベルカーは おおきな アームで つちを ほるよ。キャタピラで でこぼこの みちも はしれるんだ！", emoji: "🔧" }
];

function drawCar(svg, car) {
  const t = car.type;
  let s = "";

  // Detailed wheel with spokes
  const W = (cx, cy) => `
    <circle cx="${cx}" cy="${cy}" r="19" fill="#1a1a1a"/>
    <circle cx="${cx}" cy="${cy}" r="13" fill="#444"/>
    <circle cx="${cx}" cy="${cy}" r="5" fill="#ccc"/>
    <line x1="${cx-13}" y1="${cy}" x2="${cx+13}" y2="${cy}" stroke="#888" stroke-width="2"/>
    <line x1="${cx}" y1="${cy-13}" x2="${cx}" y2="${cy+13}" stroke="#888" stroke-width="2"/>
    <line x1="${cx-9}" y1="${cy-9}" x2="${cx+9}" y2="${cy+9}" stroke="#888" stroke-width="2"/>
    <line x1="${cx+9}" y1="${cy-9}" x2="${cx-9}" y2="${cy+9}" stroke="#888" stroke-width="2"/>`;

  if (t === "fire") {
    // 消防車: 赤・長いボディ・はしご・赤色灯
    s = `
      <rect x="94" y="74" width="174" height="56" rx="6" fill="#CC1111"/>
      <rect x="6" y="50" width="92" height="80" rx="10" fill="#BB0E0E"/>
      <rect x="6" y="50" width="92" height="10" rx="10" fill="#DD2222"/>
      <rect x="14" y="58" width="36" height="28" rx="5" fill="#87CEEB" opacity="0.9"/>
      <rect x="56" y="58" width="32" height="28" rx="5" fill="#87CEEB" opacity="0.9"/>
      <rect x="14" y="58" width="36" height="4" rx="2" fill="#fff" opacity="0.4"/>
      <rect x="56" y="58" width="32" height="4" rx="2" fill="#fff" opacity="0.4"/>
      <rect x="50" y="58" width="5" height="28" fill="#AA0E0E"/>
      <rect x="12" y="40" width="70" height="12" rx="5" fill="#880000"/>
      <rect x="14" y="41" width="18" height="10" rx="3" fill="#FF2222"/>
      <rect x="36" y="41" width="18" height="10" rx="3" fill="#2244FF"/>
      <rect x="58" y="41" width="18" height="10" rx="3" fill="#FF2222"/>
      <rect x="100" y="58" width="164" height="17" rx="4" fill="#AAA"/>
      <rect x="100" y="60" width="164" height="10" rx="3" fill="#C8C8C8"/>
      <line x1="120" y1="58" x2="120" y2="75" stroke="#888" stroke-width="2.5"/>
      <line x1="140" y1="58" x2="140" y2="75" stroke="#888" stroke-width="2.5"/>
      <line x1="160" y1="58" x2="160" y2="75" stroke="#888" stroke-width="2.5"/>
      <line x1="180" y1="58" x2="180" y2="75" stroke="#888" stroke-width="2.5"/>
      <line x1="200" y1="58" x2="200" y2="75" stroke="#888" stroke-width="2.5"/>
      <line x1="220" y1="58" x2="220" y2="75" stroke="#888" stroke-width="2.5"/>
      <line x1="240" y1="58" x2="240" y2="75" stroke="#888" stroke-width="2.5"/>
      <rect x="6" y="102" width="262" height="6" fill="#FFD700"/>
      <rect x="106" y="80" width="38" height="28" rx="3" fill="#AA0A0A" stroke="#FFD700" stroke-width="1.5"/>
      <rect x="152" y="80" width="38" height="28" rx="3" fill="#AA0A0A" stroke="#FFD700" stroke-width="1.5"/>
      <rect x="198" y="80" width="38" height="28" rx="3" fill="#AA0A0A" stroke="#FFD700" stroke-width="1.5"/>
      <rect x="121" y="92" width="6" height="3" rx="1" fill="#FFD700"/>
      <rect x="167" y="92" width="6" height="3" rx="1" fill="#FFD700"/>
      <rect x="213" y="92" width="6" height="3" rx="1" fill="#FFD700"/>
      <circle cx="244" cy="94" r="13" fill="#AA0A0A" stroke="#880000" stroke-width="1.5"/>
      <circle cx="244" cy="94" r="7" fill="#CC1111"/>

function sayJp(text, cb) {
  if (!window.speechSynthesis) { if (cb) cb(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP"; u.rate = 0.85; u.pitch = 1.1;
  u.onend = () => { if (cb) cb(); };
  setTimeout(() => window.speechSynthesis.speak(u), 300);
}
function sayEn(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.8; u.pitch = 1.15;
  window.speechSynthesis.speak(u);
}
function speakQ() { sayJp("この のりものは なに？", () => sayEn("What is this vehicle?")); }

// --- Confetti ---
const confCanvas = document.getElementById('confettiCanvas');
const confCtx = confCanvas.getContext('2d');
let confParticles = [], confAnim = null;
const CONF_COLORS = ['#FF6B6B','#FFD93D','#4ECDC4','#FF9F43','#A29BFE','#fd79a8','#55efc4'];
function launchConfetti() {
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confParticles = Array.from({length:80}, () => ({
    x: Math.random() * confCanvas.width,
    y: Math.random() * confCanvas.height * 0.4,
    r: Math.random() * 7 + 4,
    color: CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)],
    vx: (Math.random()-0.5)*3,
    vy: Math.random()*2+1,
    angle: Math.random()*360,
    spin: (Math.random()-0.5)*8,
    life: 1
  }));
  if (confAnim) cancelAnimationFrame(confAnim);
  function draw() {
    confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
    let alive = false;
    confParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.angle += p.spin; p.life -= 0.012;
      if (p.life > 0) { alive = true; }
      confCtx.save();
      confCtx.globalAlpha = Math.max(0, p.life);
      confCtx.translate(p.x, p.y);
      confCtx.rotate(p.angle * Math.PI/180);
      confCtx.fillStyle = p.color;
      confCtx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 0.5);
      confCtx.restore();
    });
    if (alive) confAnim = requestAnimationFrame(draw);
    else confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  }
  draw();
}

function updateProgress() {
  const pct = (idx / order.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function animateCarBox() {
  const box = document.getElementById('carBox');
  box.style.animation = 'none';
  box.offsetHeight; // reflow
  box.style.animation = 'slideIn 0.4s cubic-bezier(.4,1.6,.6,1)';
}

function showQ() {
  answered=false; const car=cars[order[idx]];
  const display = document.getElementById("carDisplay");
  if (photoMap[car.type]) {
    const p = photoMap[car.type];
    const src = typeof p === 'string' ? p : p.src;
    const pos = typeof p === 'string' ? 'center' : p.position;
    display.innerHTML = `<img class="car-img" src="${src}" alt="${car.jp}" style="object-position:${pos}">`;
  } else {
    display.innerHTML = `<div class="car-svg-wrap"><svg id="carSvg" viewBox="0 0 280 160" width="100%" height="auto"></svg></div>`;
    drawCar(document.getElementById("carSvg"), car);
  }
  const wrong=cars.filter((_,i)=>i!==order[idx]);
  const choices=shuffle([car,...shuffle(wrong).slice(0,3)]);
  document.getElementById("choices").innerHTML=choices.map(c=>`<button class="choice-btn" data-jp="${c.jp}" onclick="answer('${c.jp}','${car.jp}',this)"><span class="c-jp">${c.jp}</span><span class="c-en">${c.en}</span></button>`).join("");
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("qnum").textContent=idx+1;
  updateProgress();
  animateCarBox();
  setTimeout(speakQ,400);
}
function answer(chosen,correct,btn) {
  if(answered) return; answered=true;
  const car=cars[order[idx]];
  document.querySelectorAll(".choice-btn").forEach(b=>{b.style.pointerEvents="none"; if(b.dataset.jp===correct) b.classList.add("correct");});
  if(chosen===correct) {
    correctCount++;
    const scoreEl = document.getElementById("correct");
    scoreEl.textContent = correctCount;
    scoreEl.classList.remove('popped');
    scoreEl.offsetHeight;
    scoreEl.classList.add('popped');
    document.getElementById("feedback").innerHTML='<div class="fb-inner"><div class="fb-jp" style="color:#2ECC71">🎉 せいかい！すごい！</div><div class="fb-en">Great job! That\'s right!</div></div>';
    playCorrectSound();
    launchConfetti();
    sayJp("せいかい！すごい！"+car.readJp,()=>sayEn(car.readEn));
  } else {
    btn.classList.add("wrong");
    playWrongSound();
    document.getElementById("feedback").innerHTML=`<div class="fb-inner"><div class="fb-jp" style="color:#E74C3C">💦 こたえは「${correct}」だよ！</div><div class="fb-en">The answer is "${car.en}"!</div></div>`;
    sayJp("ざんねん！こたえは "+car.readJp,()=>sayEn(car.readEn));
  }
  if(idx<order.length-1) { document.getElementById("nextBtn").style.display="block"; } else { setTimeout(showResult,2500); }
}
function nextQ() { idx++; showQ(); }
function showResult() {
  document.getElementById("quiz").style.display="none"; document.getElementById("result").style.display="block";
  const s=correctCount, t=order.length;
  document.getElementById("rScore").textContent=s+" / "+t;
  document.getElementById('progressFill').style.width = '100%';
  const msgs=[["またちょうせんしてね！","Try again!"],["もうすこし！がんばれ！","Almost there!"],["よくできました！","Well done!"],["🎊 すごい！かんぺき！","Amazing! Perfect!"]];
  const mi=s===t?3:s>=t*0.75?2:s>=t*0.5?1:0;
  const starMap=["⭐","⭐⭐","⭐⭐⭐","🌟🌟🌟"];
  document.getElementById("rStars").textContent = starMap[mi];
  document.getElementById("rMsgJp").textContent=msgs[mi][0];
  document.getElementById("rMsgEn").textContent=msgs[mi][1];
  if (mi >= 2) setTimeout(launchConfetti, 300);
  sayJp(msgs[mi][0],()=>sayEn(msgs[mi][1]));
}
function restart() {
  correctCount=0; idx=0; document.getElementById("correct").textContent=0;
  document.getElementById("result").style.display="none"; document.getElementById("quiz").style.display="block";
  order=shuffle(cars.map((_,i)=>i)); showQ();
}
document.getElementById("total").textContent = cars.length;
order=shuffle(cars.map((_,i)=>i)); showQ();

// --- のりもの図鑑 ---
let zukanIdx = 0;
function showZukan() {
  const car = cars[zukanIdx];
  const display = document.getElementById("zukanDisplay");
  if (photoMap[car.type]) {
    const p = photoMap[car.type];
    const src = typeof p === 'string' ? p : p.src;
    const pos = typeof p === 'string' ? 'center' : p.position;
    display.innerHTML = `<img class="car-img" src="${src}" alt="${car.jp}" style="object-position:${pos}">`;
  } else {
    display.innerHTML = `<div class="car-svg-wrap"><svg viewBox="0 0 280 160" width="100%" height="auto"></svg></div>`;
    drawCar(display.querySelector('svg'), car);
  }
  document.getElementById("zukanEmoji").textContent = car.emoji;
  document.getElementById("zukanNameJp").textContent = car.jp;
  document.getElementById("zukanNameEn").textContent = car.en;
  document.getElementById("zukanFact").textContent = car.fact;
  document.getElementById("zukanCounter").textContent = (zukanIdx + 1) + " / " + cars.length;
  const box = document.getElementById("zukanBox");
  box.style.animation = 'none'; box.offsetHeight;
  box.style.animation = 'slideIn 0.4s cubic-bezier(.4,1.6,.6,1)';
}
function zukanNext() { zukanIdx = (zukanIdx + 1) % cars.length; showZukan(); }
function zukanPrev() { zukanIdx = (zukanIdx - 1 + cars.length) % cars.length; showZukan(); }

function switchMode(mode) {
  document.getElementById('modeQuiz').classList.toggle('active', mode === 'quiz');
  document.getElementById('modeZukan').classList.toggle('active', mode === 'zukan');
  document.getElementById('quiz').style.display = mode === 'quiz' ? 'block' : 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('zukan').style.display = mode === 'zukan' ? 'block' : 'none';
  document.getElementById('scoreBar').style.display = mode === 'quiz' ? 'flex' : 'none';
  document.getElementById('progressFill').parentElement.parentElement.style.display = mode === 'quiz' ? 'block' : 'none';
  if (mode === 'quiz') { restart(); }
  if (mode === 'zukan') { zukanIdx = 0; showZukan(); }
}
</script>

<script>
const bgm = new Audio('./bgm.m4a');
bgm.loop = true;
bgm.volume = 0.4;
let bgmOn = false;

// --- 効果音 (WAV生成 → Audio要素で再生 = BGMと同じ方式) ---
function makeWav(freq1, freq2, freq3, type) {
  const sr = 22050, dur = 0.35, gap = 0.12;
  const freqs = freq3 ? [freq1,freq2,freq3] : [freq1,freq2];
  const total = Math.ceil(sr * (freqs.length * dur + (freqs.length-1) * gap));
  const buf = new Float32Array(total);
  freqs.forEach((f, i) => {
    const start = Math.floor(i * (dur + gap) * sr);
    for (let j = 0; j < Math.floor(dur * sr); j++) {
      const t = j / sr;
      const env = Math.max(0, 1 - t / dur);
      let val = Math.sin(2 * Math.PI * f * t);
      if (type === 'square') val = val > 0 ? 1 : -1;
      buf[start + j] = val * env * 0.4;
    }
  });
  const samples = buf.length;
  const wavBuf = new ArrayBuffer(44 + samples * 2);
  const view = new DataView(wavBuf);
  const writeStr = (o,s) => { for(let i=0;i<s.length;i++) view.setUint8(o+i,s.charCodeAt(i)); };
  writeStr(0,'RIFF'); view.setUint32(4,36+samples*2,true); writeStr(8,'WAVE');
  writeStr(12,'fmt '); view.setUint32(16,16,true); view.setUint16(20,1,true);
  view.setUint16(22,1,true); view.setUint32(24,sr,true); view.setUint32(28,sr*2,true);
  view.setUint16(32,2,true); view.setUint16(34,16,true);
  writeStr(36,'data'); view.setUint32(40,samples*2,true);
  for(let i=0;i<samples;i++) { view.setInt16(44+i*2, Math.max(-32768,Math.min(32767,buf[i]*32767)),true); }
  return URL.createObjectURL(new Blob([wavBuf],{type:'audio/wav'}));
}
const correctSoundUrl = makeWav(523.25, 659.25, 783.99, 'sine');
const wrongSoundUrl = makeWav(200, 160, 0, 'square');
function playCorrectSound() { const a = new Audio(correctSoundUrl); a.volume = 0.5; a.play(); }
function playWrongSound() { const a = new Audio(wrongSoundUrl); a.volume = 0.5; a.play(); }

function toggleBgm() {
  bgmOn = !bgmOn;
  const btn = document.getElementById('bgmBtn');
  if (bgmOn) {
    bgm.play();
    btn.textContent = '🔇 BGM オフ';
    speakQ();
  } else {
    bgm.pause();
    bgm.currentTime = 0;
    btn.textContent = '🎵 BGM オン';
  }
}
</script>
